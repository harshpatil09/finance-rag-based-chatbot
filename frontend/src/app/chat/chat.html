<app-navbar></app-navbar>
<div class="chat-page">
  <div class="chat-header">
    <div>
      <div class="chat-title">Financial Report Assistant</div>
      <div class="chat-subtitle">Report: {{ reportId | slice:0:8 }}...</div>
    </div>
    <div class="chat-header-actions">
      <a [routerLink]="['/dashboard', reportId]" class="btn btn-secondary btn-sm">📊 Insights</a>
      <a routerLink="/home" class="btn btn-ghost btn-sm">← Reports</a>
    </div>
  </div>

  <div class="messages-area" #messageContainer>
    <div *ngFor="let msg of messages"
      class="message"
      [class.user-message]="msg.role === 'user'"
      [class.assistant-message]="msg.role === 'assistant'">

      <div class="avatar" [class.user-avatar]="msg.role === 'user'" [class.ai-avatar]="msg.role === 'assistant'">
        {{ msg.role === 'user' ? 'U' : 'AI' }}
      </div>

      <div class="bubble">
        <div class="loading-dots" *ngIf="msg.loading">
          <span></span><span></span><span></span>
        </div>
        <ng-container *ngIf="!msg.loading">
          <div class="message-text">{{ msg.content }}</div>
          <div class="sources-section" *ngIf="msg.sources && msg.sources.length">
            <div class="sources-label">Sources</div>
            <div class="sources-list">
              <div class="source-chip" *ngFor="let src of msg.sources">
                <span class="src-rank">#{{ src.rank }}</span>
                <span class="src-sep">·</span>
                <span class="src-section">{{ src.section }}</span>
                <span class="src-sep">·</span>
                <span class="src-page">p.{{ src.page }}</span>
                <span class="src-sep">·</span>
                <span class="src-score">{{ src.score }}</span>
              </div>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <textarea
      [(ngModel)]="question"
      (keydown)="onKeyDown($event)"
      placeholder="Ask about revenue, margins, EPS, cash flow..."
      rows="2"
      [disabled]="loading">
    </textarea>
    <button class="btn btn-primary" (click)="sendMessage()" [disabled]="!question.trim() || loading">
      {{ loading ? '...' : 'Send' }}
    </button>
  </div>
</div>

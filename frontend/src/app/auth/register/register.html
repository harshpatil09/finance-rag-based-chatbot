<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">F</div>
      <div class="logo-text">FinSight <span>AI</span></div>
    </div>
    <h1>Create account</h1>
    <p class="auth-subtitle">Start analyzing financial reports with AI</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Email address</label>
        <input type="email" formControlName="email" placeholder="you@company.com" autocomplete="email"/>
        <span class="field-error" *ngIf="email?.invalid && email?.touched">Enter a valid email</span>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Min. 6 characters" autocomplete="new-password"/>
        <span class="field-error" *ngIf="password?.invalid && password?.touched">Min. 6 characters</span>
      </div>
      <div class="alert alert-error" *ngIf="error">{{ error }}</div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" [disabled]="form.invalid || loading">
        <span class="spinner" *ngIf="loading" style="width:16px;height:16px;border-width:2px;"></span>
        {{ loading ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <p class="auth-footer">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
